name: 🚀 Deploy Spirit Echo (Direto)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🤐 Criar Pacote de Deploy
        run: |
          # Criamos uma pasta temporária para organizar o que será enviado
          mkdir build-tmp
          # Copia apenas o conteúdo da pasta public (assumindo que o projeto é estático/simples)
          cp -r public/* build-tmp/
          # Copia o .htaccess se ele existir na raiz
          [ -f .htaccess ] && cp .htaccess build-tmp/ || echo "Sem .htaccess para copiar"

          cd build-tmp
          zip -r ../deploy-spirit-echo.zip .
          cd ..

      - name: 🔑 Configure SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: 🚀 Executar Deploy no Servidor
        run: |
          # Envia o pacote para o diretório temporário do servidor
          scp -o StrictHostKeyChecking=no deploy-spirit-echo.zip ubuntu@${{ secrets.SERVER_IP }}:/tmp/

          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.SERVER_IP }} << 'EOF'
            set -e

            # Definição de caminhos (Variáveis com UNDERSCORE _)
            BASE_DIR="/var/www/spirit-echo"
            SHARED_DIR="/var/www/spirit-echo-shared"

            # 1. Garante que as pastas existam
            sudo mkdir -p ${BASE_DIR}
            sudo mkdir -p ${SHARED_DIR}

            # 2. Descompacta os arquivos diretamente na pasta de destino
            # O parâmetro -o força a substituição dos arquivos antigos
            sudo unzip -o /tmp/deploy-spirit-echo.zip -d ${BASE_DIR}

            # 3. Linkar arquivos persistentes (ex: .env) se necessário
            if [ -f "${SHARED_DIR}/.env" ]; then
                sudo ln -sfn ${SHARED_DIR}/.env ${BASE_DIR}/.env
            fi

            # 4. Ajustar permissões para o servidor web (Nginx/Apache)
            sudo chown -R www-data:www-data ${BASE_DIR}
            sudo chmod -R 755 ${BASE_DIR}

            # 5. Limpeza de arquivos temporários no servidor
            sudo rm /tmp/deploy-spirit-echo.zip
            
            echo "✅ Deploy Direto Finalizado com Sucesso!"
          EOF